<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Together</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#16181A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Together">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" href="./icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #16181A;
  --surface: #1F2224;
  --surface-2: #262A2D;
  --text: #F4F1EA;
  --text-dim: #9A9D9F;
  --border: #33373A;
  --accent-me: #3FA796;
  --accent-other: #E8735C;
  --radius: 16px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { overscroll-behavior-y: none; margin: 0; }
body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  padding-top: var(--safe-top);
}

h1, h2, h3 { font-family: 'Fraunces', serif; }
::-webkit-scrollbar { display: none; }

/* ===== ICONOS SVG INLINE ===== */
.icon {
  display: inline-block;
  width: 1em;
  height: 1em;
  vertical-align: -0.125em;
  fill: currentColor;
}

/* ===== LOGIN SCREEN ===== */
#login-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
  gap: 48px;
}

.brand {
  text-align: center;
}

.brand h1 {
  font-size: 2.4rem;
  font-weight: 600;
  margin: 0 0 8px 0;
  letter-spacing: -0.5px;
}

.brand p {
  font-size: 0.95rem;
  color: var(--text-dim);
  margin: 0;
  font-weight: 300;
}

#login-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  max-width: 360px;
}

#login-form input {
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 16px;
  font-family: inherit;
  transition: var(--transition);
}

#login-form input:focus {
  outline: none;
  border-color: var(--accent-me);
  background: var(--surface-2);
}

#login-form button {
  padding: 12px 14px;
  border-radius: 10px;
  border: none;
  background: var(--accent-me);
  color: #0d0d0d;
  font-weight: 600;
  font-size: 0.95rem;
  cursor: pointer;
  transition: var(--transition);
  margin-top: 4px;
}

#login-form button:active {
  transform: scale(0.98);
}

#login-error {
  color: var(--accent-other);
  font-size: 0.85rem;
  min-height: 1.2em;
  text-align: center;
}

/* ===== APP SHELL ===== */
#app {
  display: none;
  max-width: 720px;
  margin: 0 auto;
  padding: 16px 16px calc(76px + var(--safe-bottom));
  min-height: 100vh;
}

header.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  padding: 12px 0;
}

.user-info {
  display: flex;
  align-items: center;
  gap: 12px;
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--accent-me);
  flex-shrink: 0;
}

.user-details {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.user-name {
  font-weight: 600;
  font-size: 0.95rem;
}

.sync-status {
  font-size: 0.75rem;
  color: var(--text-dim);
}

.header-actions {
  display: flex;
  gap: 8px;
}

.icon-btn {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  transition: var(--transition);
}

.icon-btn:active {
  transform: scale(0.92);
  background: var(--surface-2);
}

/* ===== VIEWS ===== */
.view { display: none; }
.view.active { display: block; }

.month-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.month-nav h2 {
  font-size: 1.6rem;
  font-weight: 600;
  margin: 0;
  text-transform: capitalize;
}

.legend {
  display: flex;
  gap: 16px;
  font-size: 0.85rem;
  color: var(--text-dim);
  margin-bottom: 20px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

/* ===== CALENDARIO ===== */
.grid-week {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  margin-bottom: 8px;
}

.day-label {
  text-align: center;
  font-size: 0.7rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 600;
}

.grid-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.day-cell {
  aspect-ratio: 1;
  border-radius: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 6px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 4px;
  position: relative;
  overflow: hidden;
  transition: var(--transition);
}

.day-cell:active {
  transform: scale(0.96);
}

.day-cell.other-month {
  opacity: 0.25;
}

.day-cell.today {
  border-color: var(--accent-me);
  border-width: 1.5px;
}

.day-num {
  font-size: 0.8rem;
  font-weight: 600;
  z-index: 2;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
}

.day-dots {
  display: flex;
  gap: 3px;
  flex-wrap: wrap;
  margin-top: auto;
  z-index: 2;
}

.day-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  box-shadow: 0 0 0 0.5px rgba(0, 0, 0, 0.2);
}

.day-thumb {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
}

.day-thumb::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(0, 0, 0, 0) 40%, rgba(0, 0, 0, 0.4) 100%);
}

/* ===== FEED ===== */
#feed-list {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.feed-empty {
  text-align: center;
  color: var(--text-dim);
  padding: 60px 20px;
  font-size: 0.95rem;
}

.feed-card {
  background: var(--surface);
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid var(--border);
  transition: var(--transition);
}

.feed-card:active {
  border-color: var(--text-dim);
}

.fc-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px;
}

.fc-dot {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  flex-shrink: 0;
}

.fc-meta {
  flex: 1;
}

.fc-title {
  font-weight: 600;
  font-size: 0.95rem;
  margin: 0;
}

.fc-date {
  font-size: 0.75rem;
  color: var(--text-dim);
  text-transform: capitalize;
  margin: 4px 0 0 0;
}

.fc-carousel {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  gap: 0;
}

.fc-carousel img {
  width: 100%;
  flex: 0 0 100%;
  scroll-snap-align: center;
  aspect-ratio: 1/1;
  object-fit: cover;
  cursor: pointer;
}

.fc-body {
  padding: 12px 14px;
}

.fc-time {
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.fc-notes {
  font-size: 0.85rem;
  color: var(--text-dim);
  white-space: pre-wrap;
  margin: 8px 0;
}

.fc-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 14px 12px 14px;
  font-size: 0.75rem;
  color: var(--text-dim);
}

.fc-actions {
  display: flex;
  gap: 12px;
}

.btn-small {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 600;
  transition: var(--transition);
}

.btn-small.edit {
  color: var(--accent-me);
}

.btn-small:active {
  opacity: 0.7;
}

/* ===== BOTTOM NAV ===== */
#bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 8px 12px calc(10px + var(--safe-bottom));
  max-width: 720px;
  margin: 0 auto;
  z-index: 30;
}

.nav-btn {
  flex: 1;
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  font-size: 0.7rem;
  padding: 6px 0;
  transition: var(--transition);
}

.nav-btn.active {
  color: var(--accent-me);
}

.nav-icon {
  font-size: 1.3rem;
}

/* ===== MODALS ===== */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 50;
  align-items: flex-end;
  justify-content: center;
  animation: fadeIn 0.2s ease-out;
}

@media (min-width: 600px) {
  .overlay { align-items: center; }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal {
  background: var(--surface);
  width: 100%;
  max-width: 480px;
  max-height: 88vh;
  overflow-y: auto;
  border-radius: 20px 20px 0 0;
  padding: 20px 20px calc(20px + var(--safe-bottom));
  border: 1px solid var(--border);
  animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

@media (min-width: 600px) {
  .modal {
    border-radius: 16px;
    padding-bottom: 20px;
  }
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.modal-title {
  font-size: 1.2rem;
  font-weight: 600;
  margin: 0;
}

.modal-close {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 1.4rem;
  cursor: pointer;
  padding: 0;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
}

.modal-close:active {
  color: var(--text);
}

.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-bottom: 6px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.02em;
}

.form-input {
  width: 100%;
  padding: 11px 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  font-family: inherit;
  font-size: 0.95rem;
  transition: var(--transition);
}

.form-input:focus {
  outline: none;
  border-color: var(--accent-me);
  background: var(--bg);
}

textarea.form-input {
  resize: vertical;
  min-height: 70px;
  font-family: 'Inter', sans-serif;
}

.file-drop {
  border: 1.5px dashed var(--border);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  color: var(--text-dim);
  font-size: 0.85rem;
  transition: var(--transition);
}

.file-drop:active {
  border-color: var(--accent-me);
  background: rgba(63, 167, 150, 0.05);
}

.thumbs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 12px;
}

.thumb {
  position: relative;
  width: 64px;
  height: 64px;
  border-radius: 10px;
  overflow: hidden;
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.thumb-remove {
  position: absolute;
  top: 2px;
  right: 2px;
  background: rgba(0, 0, 0, 0.8);
  border: none;
  color: #fff;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  font-size: 0.7rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.btn {
  flex: 1;
  padding: 12px 14px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  font-size: 0.9rem;
  transition: var(--transition);
}

.btn-primary {
  background: var(--accent-me);
  color: #0d0d0d;
}

.btn-primary:active {
  transform: scale(0.96);
}

.btn-secondary {
  background: var(--surface-2);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-secondary:active {
  background: var(--surface);
}

/* ===== EVENTS LIST ===== */
.events-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 12px;
}

.event-item {
  background: var(--surface-2);
  border-radius: 12px;
  padding: 0;
  overflow: hidden;
  border-left: 3px solid var(--accent-me);
}

.event-item.by-other {
  border-left-color: var(--accent-other);
}

.event-carousel {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
}

.event-carousel img {
  width: 100%;
  flex: 0 0 100%;
  scroll-snap-align: center;
  aspect-ratio: 4/3;
  object-fit: cover;
  cursor: pointer;
}

.event-body {
  padding: 12px;
}

.event-title {
  font-weight: 600;
  margin-bottom: 4px;
}

.event-time {
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.event-notes {
  font-size: 0.85rem;
  color: var(--text-dim);
  margin-bottom: 8px;
  white-space: pre-wrap;
}

.event-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.75rem;
  color: var(--text-dim);
}

.event-actions {
  display: flex;
  gap: 12px;
}

/* ===== LIGHTBOX ===== */
#lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.95);
  z-index: 80;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

#lightbox img {
  max-width: 100%;
  max-height: 100%;
  border-radius: 12px;
}

/* ===== SETTINGS PANEL ===== */
#theme-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 18px 18px calc(18px + var(--safe-bottom));
  display: none;
  z-index: 60;
  border-radius: 20px 20px 0 0;
  max-width: 720px;
  margin: 0 auto;
  animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.settings-title {
  font-size: 1.1rem;
  font-weight: 600;
  margin: 0 0 16px 0;
}

.setting-group {
  margin-bottom: 18px;
}

.setting-label {
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-bottom: 8px;
  display: block;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.02em;
}

.swatches {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.swatch {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: var(--transition);
}

.swatch:active {
  transform: scale(0.9);
}

.swatch.active {
  border-color: #fff;
  box-shadow: 0 0 0 1px var(--surface);
}

#custom-color {
  width: 100%;
  height: 40px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface-2);
  cursor: pointer;
  margin-top: 8px;
}

#name-input {
  width: 100%;
  margin-bottom: 12px;
}

/* ===== INSTALL BANNER ===== */
#install-banner {
  display: none;
  position: fixed;
  top: calc(var(--safe-top) + 12px);
  left: 12px;
  right: 12px;
  z-index: 70;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  align-items: center;
  gap: 10px;
  max-width: 696px;
  margin: 0 auto;
  animation: slideUp 0.3s ease-out;
}

#install-banner span {
  flex: 1;
  font-size: 0.82rem;
}

#install-banner button {
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}

#install-action {
  background: var(--accent-me);
  color: #0d0d0d;
}

#install-action:active {
  transform: scale(0.96);
}

.install-dismiss {
  background: none;
  color: var(--text-dim);
}
</style>
</head>
<body>

<!-- INSTALL BANNER -->
<div id="install-banner">
  <span id="install-text">Instala la app en tu pantalla de inicio</span>
  <button class="install-dismiss" id="install-dismiss">Descartar</button>
  <button id="install-action">Instalar</button>
</div>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="brand">
    <h1>Together</h1>
  </div>
  <form id="login-form">
    <input type="email" id="email" placeholder="Correo electrónico" autocomplete="username" required>
    <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password" required>
    <button type="submit" id="login-btn">Entrar</button>
    <div id="login-error"></div>
  </form>
</div>

<!-- APP SHELL -->
<div id="app">
  <header class="topbar">
    <div class="user-info">
      <div class="avatar" id="my-avatar"></div>
      <div class="user-details">
        <div class="user-name" id="my-name">Usuario</div>
        <div class="sync-status" id="sync-status">Sincronizando...</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="theme-btn" title="Preferencias">⚙</button>
      <button class="icon-btn" id="logout-btn" title="Salir">⎋</button>
    </div>
  </header>

  <!-- CALENDAR VIEW -->
  <section class="view active" id="view-calendar">
    <div class="month-nav">
      <button class="icon-btn" id="prev-month">‹</button>
      <h2 id="month-label">Mes</h2>
      <button class="icon-btn" id="next-month">›</button>
    </div>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" id="legend-me-dot" style="background:var(--accent-me)"></div>
        <span id="legend-me-label">Yo</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--accent-other)"></div>
        <span id="legend-other-label">La otra persona</span>
      </div>
    </div>
    <div class="grid-week">
      <div class="day-label">Do</div>
      <div class="day-label">Lu</div>
      <div class="day-label">Ma</div>
      <div class="day-label">Mi</div>
      <div class="day-label">Ju</div>
      <div class="day-label">Vi</div>
      <div class="day-label">Sa</div>
    </div>
    <div class="grid-days" id="grid-days"></div>
  </section>

  <!-- MEMORIES VIEW -->
  <section class="view" id="view-feed">
    <h2 style="font-size:1.4rem; margin:0 0 20px 0; font-weight:600;">Recuerdos</h2>
    <div id="feed-list"></div>
  </section>
</div>

<!-- BOTTOM NAV -->
<div id="bottom-nav">
  <button class="nav-btn active" data-view="view-calendar">
    <span class="nav-icon">📅</span>
    <span>Calendario</span>
  </button>
  <button class="nav-btn" data-view="view-feed">
    <span class="nav-icon">🖼</span>
    <span>Recuerdos</span>
  </button>
</div>

<!-- DAY MODAL -->
<div class="overlay" id="day-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="day-modal-title">Fecha</h2>
      <button class="modal-close" id="close-day-btn">×</button>
    </div>
    <div class="events-list" id="events-list"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" id="add-event-btn">+ Evento</button>
    </div>
  </div>
</div>

<!-- EVENT FORM MODAL -->
<div class="overlay" id="event-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="event-modal-title">Nuevo evento</h2>
      <button class="modal-close" id="close-event-btn">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">Título</label>
      <input type="text" id="ev-title" class="form-input" placeholder="Ej: Aniversario, cita, viaje...">
    </div>
    <div class="form-group">
      <label class="form-label">Hora (opcional)</label>
      <input type="time" id="ev-time" class="form-input">
    </div>
    <div class="form-group">
      <label class="form-label">Notas</label>
      <textarea id="ev-notes" class="form-input" placeholder="Detalles del evento..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Fotos</label>
      <div class="file-drop" id="file-drop">Toca para seleccionar imágenes</div>
      <input type="file" id="file-input" accept="image/*" multiple style="display:none">
      <div class="thumbs" id="thumbs"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="cancel-event-btn">Cancelar</button>
      <button class="btn btn-primary" id="save-event-btn">Guardar</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <img id="lightbox-img" src="">
</div>

<!-- SETTINGS PANEL -->
<div id="theme-panel">
  <h3 class="settings-title">Preferencias</h3>
  
  <div class="setting-group">
    <label class="setting-label">Mi nombre</label>
    <input type="text" id="name-input" class="form-input" placeholder="Tu nombre">
  </div>
  
  <div class="setting-group">
    <label class="setting-label">Mi color</label>
    <div class="swatches" id="swatches"></div>
    <label class="setting-label" style="margin-top:8px;">Personalizado</label>
    <input type="color" id="custom-color">
  </div>
  
  <button class="btn btn-secondary" style="width:100%;margin-top:16px;" id="close-theme-btn">Listo</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, doc, setDoc, getDoc, collection, onSnapshot,
  addDoc, updateDoc, deleteDoc, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7fnh1Mg264Zrqmux-p2168WaTBKEmhGg",
  authDomain: "together-5729b.firebaseapp.com",
  projectId: "together-5729b",
  storageBucket: "together-5729b.firebasestorage.app",
  messagingSenderId: "985516430457",
  appId: "1:985516430457:web:e70ab030c9c6779fdc30a8"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

console.log("✓ Firebase inicializado");

const SWATCH_OPTIONS = ["#3FA796","#E8735C","#7C9CF2","#F2C14E","#C77DFF","#4EC9F2","#F28C8C","#8CE9A1"];

let currentUID = null;
let currentUserName = "Usuario";
let myColor = "#3FA796";
let otherColor = "#E8735C";
let otherUserName = "Otra persona";
let otherUID = null;
let viewDate = new Date();
let selectedDay = null;
let eventsCache = [];
let pendingImages = [];
let usersData = {};
let editingEventId = null;

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(console.error);
  });
}

let deferredPrompt = null;
const banner = document.getElementById("install-banner");
const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  if (!isStandalone && !localStorage.getItem("install-dismissed")) {
    banner.style.display = "flex";
  }
});

document.getElementById("install-action").addEventListener("click", async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    banner.style.display = "none";
  }
});
document.getElementById("install-dismiss").addEventListener("click", () => {
  banner.style.display = "none";
  localStorage.setItem("install-dismissed", "1");
});

document.getElementById("login-form").addEventListener("submit", async (e)=>{
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errorBox = document.getElementById("login-error");
  const loginBtn = document.getElementById("login-btn");
  errorBox.textContent = "";
  
  if(!email || !password){
    errorBox.textContent = "Completa email y contraseña.";
    return;
  }
  
  loginBtn.textContent = "Entrando...";
  loginBtn.disabled = true;
  
  try{
    await signInWithEmailAndPassword(auth, email, password);
  }catch(err){
    loginBtn.textContent = "Entrar";
    loginBtn.disabled = false;
    
    if(err.code === "auth/user-not-found"){
      errorBox.textContent = "El email no existe.";
    } else if(err.code === "auth/wrong-password"){
      errorBox.textContent = "Contraseña incorrecta.";
    } else if(err.code === "auth/invalid-email"){
      errorBox.textContent = "Email inválido.";
    } else {
      errorBox.textContent = "Error: " + err.message;
    }
  }
});
document.getElementById("logout-btn").addEventListener("click", ()=> signOut(auth));

onAuthStateChanged(auth, async (user)=>{
  if(!user){
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("app").style.display = "none";
    document.getElementById("bottom-nav").style.display = "none";
    return;
  }
  
  try {
    currentUID = user.uid;

    const userRef = doc(db, "users", currentUID);
    const snap = await getDoc(userRef);
    if(!snap.exists()){
      const name = prompt("¿Cuál es tu nombre?") || "Usuario";
      await setDoc(userRef, { name, color: "#3FA796" });
    }

    onSnapshot(collection(db, "users"), (qs)=>{
      usersData = {};
      qs.forEach(d=>{
        usersData[d.id] = d.data();
      });
      
      if(usersData[currentUID]){
        const myData = usersData[currentUID];
        currentUserName = myData.name || "Usuario";
        myColor = myData.color || "#3FA796";
        document.getElementById("my-name").textContent = currentUserName;
        document.getElementById("legend-me-label").textContent = currentUserName + " (yo)";
        applyMyColor(myColor);
      }

      Object.keys(usersData).forEach(uid=>{
        if(uid !== currentUID){
          otherUID = uid;
          const otherData = usersData[uid];
          otherUserName = otherData.name || "Otra persona";
          otherColor = otherData.color || "#E8735C";
          document.getElementById("legend-other-label").textContent = otherUserName;
          document.documentElement.style.setProperty("--accent-other", otherColor);
        }
      });
      
      renderCalendar();
      renderFeed();
      if(selectedDay) renderDayModal(selectedDay);
    });

    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("bottom-nav").style.display = "flex";
    document.getElementById("sync-status").textContent = "Sincronizado ✓";

    listenEvents();
    renderCalendar();
  } catch(err) {
    console.error("Error:", err);
    alert("Error: " + err.message);
    await signOut(auth);
  }
});

function applyMyColor(hex){ document.documentElement.style.setProperty("--accent-me", hex); }

document.querySelectorAll(".nav-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
    document.getElementById(btn.dataset.view).classList.add("active");
    if(btn.dataset.view === "view-feed") renderFeed();
  });
});

const swatchesEl = document.getElementById("swatches");
SWATCH_OPTIONS.forEach(c=>{
  const el = document.createElement("button");
  el.className = "swatch";
  el.style.background = c;
  el.type = "button";
  el.addEventListener("click", ()=> saveMyColor(c));
  swatchesEl.appendChild(el);
});
document.getElementById("custom-color").addEventListener("input", (e)=> saveMyColor(e.target.value));

async function saveMyColor(hex){
  myColor = hex;
  applyMyColor(hex);
  await setDoc(doc(db,"users",currentUID), { color: hex }, { merge:true });
  renderCalendar();
  renderFeed();
}
document.getElementById("theme-btn").addEventListener("click", ()=>{
  document.getElementById("name-input").value = currentUserName;
  document.getElementById("theme-panel").style.display = "block";
});

document.getElementById("name-input").addEventListener("blur", async ()=>{
  const newName = document.getElementById("name-input").value.trim();
  if(newName && newName !== currentUserName){
    currentUserName = newName;
    await setDoc(doc(db,"users",currentUID), { name: newName }, { merge:true });
  }
});

document.getElementById("close-theme-btn").addEventListener("click", ()=>{
  document.getElementById("theme-panel").style.display = "none";
});

const MESES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];

document.getElementById("prev-month").addEventListener("click", ()=>{ viewDate.setMonth(viewDate.getMonth()-1); renderCalendar(); });
document.getElementById("next-month").addEventListener("click", ()=>{ viewDate.setMonth(viewDate.getMonth()+1); renderCalendar(); });

function ymd(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }

function renderCalendar(){
  document.getElementById("month-label").textContent = MESES[viewDate.getMonth()] + " " + viewDate.getFullYear();
  const grid = document.getElementById("grid-days");
  grid.innerHTML = "";

  const year = viewDate.getFullYear(), month = viewDate.getMonth();
  const firstDay = new Date(year, month, 1);
  const startOffset = firstDay.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const today = ymd(new Date());
  const totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;

  for(let i=0;i<totalCells;i++){
    const dayNum = i - startOffset + 1;
    const cellDate = new Date(year, month, dayNum);
    const key = ymd(cellDate);
    const cell = document.createElement("div");
    cell.className = "day-cell";
    if(dayNum < 1 || dayNum > daysInMonth) cell.classList.add("other-month");
    if(key === today) cell.classList.add("today");

    const dayEvents = eventsCache.filter(ev => ev.date === key);
    const thumbEvent = dayEvents.find(ev => ev.images && ev.images.length);
    if(thumbEvent){
      const thumb = document.createElement("div");
      thumb.className = "day-thumb";
      thumb.style.backgroundImage = "url(" + thumbEvent.images[0] + ")";
      cell.appendChild(thumb);
    }

    const num = document.createElement("div");
    num.className = "day-num";
    num.textContent = dayNum > 0 && dayNum <= daysInMonth ? dayNum : "";
    cell.appendChild(num);

    const dots = document.createElement("div");
    dots.className = "day-dots";
    dayEvents.slice(0,4).forEach(ev=>{
      const dot = document.createElement("div");
      dot.className = "day-dot";
      dot.style.background = ev.authorUID === currentUID ? "var(--accent-me)" : "var(--accent-other)";
      dots.appendChild(dot);
    });
    cell.appendChild(dots);

    cell.addEventListener("click", ()=> openDay(key, cellDate));
    grid.appendChild(cell);
  }
}

function listenEvents(){
  const q = query(collection(db, "events"), orderBy("date"));
  onSnapshot(q, (qs)=>{
    eventsCache = [];
    qs.forEach(d=> eventsCache.push({ id: d.id, ...d.data() }));
    renderCalendar();
    renderFeed();
    if(selectedDay) renderDayModal(selectedDay);
  });
}

function openDay(key, dateObj){
  selectedDay = key;
  document.getElementById("day-modal-title").textContent =
    dateObj.toLocaleDateString("es-ES", { weekday:"long", day:"numeric", month:"long" });
  renderDayModal(key);
  document.getElementById("day-overlay").style.display = "flex";
}
document.getElementById("close-day-btn").addEventListener("click", ()=>{
  document.getElementById("day-overlay").style.display = "none";
  selectedDay = null;
});

function renderDayModal(key){
  const list = document.getElementById("events-list");
  list.innerHTML = "";
  const dayEvents = eventsCache.filter(ev => ev.date === key);
  if(dayEvents.length === 0){
    list.innerHTML = '<div style="color:var(--text-dim); font-size:.85rem; text-align:center; padding:20px;">Sin eventos</div>';
  }
  dayEvents.forEach(ev=> list.appendChild(buildEventCard(ev, false)));
}

function openEditEvent(ev){
  editingEventId = ev.id;
  pendingImages = ev.images ? [...ev.images] : [];
  document.getElementById("event-modal-title").textContent = "Editar evento";
  document.getElementById("ev-title").value = ev.title || "";
  document.getElementById("ev-time").value = ev.time || "";
  document.getElementById("ev-notes").value = ev.notes || "";
  document.getElementById("thumbs").innerHTML = "";
  pendingImages.forEach((src, i)=> addThumb(src, i));
  document.getElementById("event-overlay").style.display = "flex";
}

function addThumb(src, idx){
  const t = document.createElement("div");
  t.className = "thumb";
  const btn = document.createElement("button");
  btn.type = "button";
  btn.className = "thumb-remove";
  btn.textContent = "×";
  btn.addEventListener("click", ()=>{
    pendingImages.splice(idx,1);
    refreshThumbs();
  });
  const img = document.createElement("img");
  img.src = src;
  t.appendChild(img);
  t.appendChild(btn);
  document.getElementById("thumbs").appendChild(t);
}

function refreshThumbs(){
  document.getElementById("thumbs").innerHTML = "";
  pendingImages.forEach((src,i)=> addThumb(src,i));
}

function buildEventCard(ev, feedStyle){
  const item = document.createElement(feedStyle ? "div" : "div");
  item.className = feedStyle ? "feed-card" : "event-item";
  if(!feedStyle && ev.authorUID !== currentUID) item.classList.add("by-other");

  let html = "";
  if(feedStyle){
    const dateObj = new Date(ev.date + "T00:00:00");
    const label = dateObj.toLocaleDateString("es-ES", { day:"numeric", month:"long", year:"numeric" });
    html += '<div class="fc-header">' +
      '<div class="fc-dot" style="background:' + (ev.authorUID === currentUID ? 'var(--accent-me)' : 'var(--accent-other)') + '"></div>' +
      '<div class="fc-meta"><h3 class="fc-title">' + escapeHTML(ev.title) + '</h3><p class="fc-date">' + label + '</p></div></div>';
  }

  const carouselClass = feedStyle ? "fc-carousel" : "event-carousel";
  if(ev.images && ev.images.length){
    html += '<div class="' + carouselClass + '"></div>';
  }

  if(feedStyle){
    html += '<div class="fc-body">';
    if(ev.time) html += '<div class="fc-time">🕐 ' + ev.time + '</div>';
    if(ev.notes) html += '<div class="fc-notes">' + escapeHTML(ev.notes) + '</div>';
    const authorName = ev.authorUID === currentUID ? "Vos" : (usersData[ev.authorUID]?.name || "La otra persona");
    html += '<div class="fc-footer"><span>' + authorName + '</span>' +
      '<div class="fc-actions">' +
        (ev.authorUID === currentUID ? `<button class="btn-small edit" data-id="${ev.id}">Editar</button>` : '') +
        (ev.authorUID === currentUID ? `<button class="btn-small" data-id="${ev.id}" data-action="delete">Eliminar</button>` : '') +
      '</div></div></div>';
  } else {
    const authorName = ev.authorUID === currentUID ? "Agregado por vos" : ("Agregado por " + (usersData[ev.authorUID]?.name || "la otra persona"));
    html += '<div class="event-body"><h3 class="event-title">' + escapeHTML(ev.title) + '</h3>' +
      (ev.time ? '<div class="event-time">🕐 ' + ev.time + '</div>' : '') +
      (ev.notes ? '<div class="event-notes">' + escapeHTML(ev.notes) + '</div>' : '') +
      '<div class="event-footer"><span>' + authorName + '</span>' +
      '<div class="event-actions">' +
        (ev.authorUID === currentUID ? `<button class="btn-small edit" data-id="${ev.id}">Editar</button>` : '') +
        (ev.authorUID === currentUID ? `<button class="btn-small" data-id="${ev.id}" data-action="delete">Eliminar</button>` : '') +
      '</div></div></div>';
  }

  item.innerHTML = html;

  const carouselEl = item.querySelector("." + carouselClass);
  if(carouselEl){
    (ev.images||[]).forEach(src=>{
      const img = document.createElement("img");
      img.src = src;
      img.addEventListener("click", ()=> openLightbox(src));
      carouselEl.appendChild(img);
    });
  }

  item.querySelectorAll(".btn-small").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      if(btn.dataset.action === "delete"){
        if(confirm("¿Eliminar este evento?")) await deleteDoc(doc(db,"events", ev.id));
      } else {
        openEditEvent(ev);
      }
    });
  });
  
  return item;
}

function renderFeed(){
  const list = document.getElementById("feed-list");
  list.innerHTML = "";
  const withPhotos = eventsCache
    .filter(ev => ev.images && ev.images.length)
    .sort((a,b)=> b.date.localeCompare(a.date));

  if(withPhotos.length === 0){
    list.innerHTML = '<div class="feed-empty">No hay recuerdos con fotos<br><span style="font-size:0.9rem;">Agrega uno desde el calendario</span></div>';
    return;
  }
  withPhotos.forEach(ev => list.appendChild(buildEventCard(ev, true)));
}

function escapeHTML(str){
  const d = document.createElement("div");
  d.textContent = str || "";
  return d.innerHTML;
}

function openLightbox(src){
  document.getElementById("lightbox-img").src = src;
  document.getElementById("lightbox").style.display = "flex";
}
document.getElementById("lightbox").addEventListener("click", ()=>{
  document.getElementById("lightbox").style.display = "none";
});

document.getElementById("add-event-btn").addEventListener("click", ()=>{
  editingEventId = null;
  pendingImages = [];
  document.getElementById("event-modal-title").textContent = "Nuevo evento";
  document.getElementById("ev-title").value = "";
  document.getElementById("ev-time").value = "";
  document.getElementById("ev-notes").value = "";
  document.getElementById("thumbs").innerHTML = "";
  document.getElementById("event-overlay").style.display = "flex";
});

document.getElementById("close-event-btn").addEventListener("click", ()=>{
  editingEventId = null;
  document.getElementById("event-overlay").style.display = "none";
});

document.getElementById("cancel-event-btn").addEventListener("click", ()=>{
  editingEventId = null;
  document.getElementById("event-overlay").style.display = "none";
});

document.getElementById("file-drop").addEventListener("click", ()=>{
  document.getElementById("file-input").click();
});

document.getElementById("file-input").addEventListener("change", async (e)=>{
  const files = Array.from(e.target.files);
  for(const file of files){
    const resized = await resizeImage(file, 1000, 0.75);
    pendingImages.push(resized);
    addThumb(resized, pendingImages.length-1);
  }
  e.target.value = "";
});

function resizeImage(file, maxSize, quality){
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let width = img.width, height = img.height;
        if(width > height && width > maxSize){ height *= maxSize/width; width = maxSize; }
        else if(height > maxSize){ width *= maxSize/height; height = maxSize; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

document.getElementById("save-event-btn").addEventListener("click", async ()=>{
  const title = document.getElementById("ev-title").value.trim();
  if(!title){ alert("Ponés al menos un título."); return; }
  const notes = document.getElementById("ev-notes").value.trim();
  const time = document.getElementById("ev-time").value || null;
  
  const eventData = {
    title, notes, time,
    images: pendingImages,
    authorUID: currentUID
  };

  if(editingEventId){
    await updateDoc(doc(db,"events", editingEventId), eventData);
    editingEventId = null;
  } else {
    eventData.date = selectedDay;
    eventData.createdAt = serverTimestamp();
    await addDoc(collection(db,"events"), eventData);
  }
  
  document.getElementById("event-overlay").style.display = "none";
});
</script>
</body>
</html>
